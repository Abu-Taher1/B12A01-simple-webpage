<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Static Webpage</title>
    

    <!--link to css file-->
    <link rel="stylesheet" href="styles/style.css">

    <!--primary font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

   <!--secondary font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">





</head>

<body>

    <div class="shared-img">


        <!--navigation-->
        <header>
            <nav class="nav">

                <div>
                    <a href="" class="nav-logo primary-font">LOGO</a>
                </div>

                <div>
                    <button class="nav-btn primary-font">Sign Up</button>
                </div>

            </nav>
        </header>


        <!--hero section-->
        <section class="hero">

            <div class="hero-container">

                <div ><h1 class="hero-title primary-font">Cool Dark UI Template for<br> Webflow Agencies!</h1></div>

            <div><button  class="hero-btn primary-font">Get Started</button></div>

            </div>
    

        </section>
        


    </div>


    <!--main section-->
    <section class="action-part">

        <div class="action-content primary-font">

            <h2 class="action-content-title">See It in Action</h2>

            <p class="action-content-description">Explore the live preview and imagine your brand in this bold new look.</p>

            <button class="action-content-btn">Launch Live Preview</button>

        </div>




        <div>

            <img class="action-img" src="./Assets/wc-mini.png" alt="">

        </div>



    </section>


    <section class="preview-part">

        <div class="preview-heading primary-font">

            <h1  class="preview-title">Joined Thousands of Productive Users</h1>

        </div>



        <div class="preview-content">

            <div class="preview-content-1 secondary-font">

                <h2 class="preview-content-1-title">50K</h2>

                <p class="preview-content-1-description">Active Users</p>

            </div>

            <div class="preview-content-2 secondary-font">

                <h2 class="preview-content-2-title">2M+</h2>

                <p class="preview-content-2-description">Focus Sessions</p>

            </div>

            <div class="preview-content-3 secondary-font">


                <h2 class="preview-content-3-title">95%</h2>

                <p class="preview-content-3-description">Satisfaction Rate</p>


            </div>

        </div>






    </section>





    
</body>

</html>
